<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPLICIOUS // High-Performance Infrastructure</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="glass-nav">
        <a href="#" class="nav-brand">SIMPLICIOUS.DEV</a>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>High-Performance<br>Web Infrastructure.</h1>
            <p class="hero-tagline">Maximum Speed. Pure Precision.<br>High-speed systems for the high-stakes founder.</p>
            <a href="#contact" class="btn-primary">Request Your Site</a>
        </div>
    </section>

    <section class="roi-section">
        <div class="sultan-glass">
            <h2 class="audit-title">Return on Investment Calculator</h2>
            <div class="audit-main-grid">
                <div class="panel">
                    <div class="input-field">
                        <label>Monthly Visitors</label>
                        <input type="number" id="traffic" placeholder="2000">
                    </div>
                    <div class="input-field">
                        <label>Avg. Sale Value ($)</label>
                        <input type="number" id="saleValue" placeholder="500">
                    </div>
                    <div class="input-field">
                        <label>Current Conv. Rate (%)</label>
                        <input type="number" id="convRate" placeholder="1.0">
                    </div>
                    <button class="scan-btn" onclick="runAudit()">Calculate Revenue</button>
                </div>
                <div class="panel" id="auditResult">
                    </div>
            </div>
        </div>
    </section>

    <section class="contact-section">
        <h2 class="contact-header">Contact</h2>
        <div class="contact-box-wide">
            <form class="contact-grid">
                <div class="form-group"><label>Name</label><input type="text" placeholder="Your Name"></div>
                <div class="form-group"><label>Email</label><input type="email" placeholder="email@example.com"></div>
                <div class="form-group full-width"><label>Project Details</label><textarea rows="5">What are we building?</textarea></div>
                <div class="form-group full-width"><button type="submit" class="scan-btn">Send Request</button></div>
            </form>
        </div>
    </section>

    <footer class="telemetry-footer">
        <div>&copy; 2026 SIMPLICIOUS.DEV</div>
        <div>SYSTEM STATUS: OPERATIONAL</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
